<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #joke { margin: 20px 0; font-size: 24px; }
        button { padding: 10px 15px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Joke Generator</h1>
    <div id="joke">Click the button to generate a joke!</div>
    <button id="jokeBtn">Get a Joke</button>
    <script>
        document.getElementById('jokeBtn').addEventListener('click', async () => {
            const response = await fetch('https://api.jokes.one/jod');
            const data = await response.json();
            const joke = data.contents.jokes[0].joke.text;
            document.getElementById('joke').innerText = joke;
        });
    </script>
</body>
</html>
